{% extends "base.html" %}

{% block title %}南京城墙历史事件 - 南京城墙历史{% endblock %}

{% block content %}
<div class="container mt-5">
    <h1 class="mb-4">南京城墙历史事件</h1>
    <div class="timeline">
        {% for event in history %}
        <div class="timeline-item">
            <div class="timeline-content">
                <h3>{{ event.year }}年 - {{ event.title }}</h3>
                <p>{{ event.description }}</p>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
